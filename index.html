<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
--bg:#0D0D0F;--surface:#1C1C1E;--surface2:#2C2C2E;--surface3:#3A3A3C;
--text:#F2F2F7;--text2:#AEAEB2;--text3:#636366;
--accent:#F5A623;--accent2:#FF6B35;
--radius:14px;--radius-sm:8px;
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px}

.header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(13,13,15,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:100;border-bottom:0.5px solid rgba(255,255,255,0.06)}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-text{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.logo-text span{color:var(--accent)}

.search-wrap{padding:12px 20px}
.search-box{background:var(--surface);border-radius:12px;display:flex;align-items:center;gap:10px;padding:0 14px;height:44px;border:0.5px solid rgba(255,255,255,0.08)}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-size:15px;flex:1;caret-color:var(--accent)}
.search-box input::placeholder{color:var(--text3)}

.section-title{font-size:18px;font-weight:700;padding:0 20px;margin:4px 0 12px;letter-spacing:-0.2px}
.section-sub{color:var(--text2);font-size:13px;margin-top:2px;font-weight:400}

.hero-scroll{display:flex;gap:12px;padding:0 20px 4px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.hero-scroll::-webkit-scrollbar{display:none}
.hero-card{min-width:260px;height:140px;border-radius:var(--radius);position:relative;overflow:hidden;flex-shrink:0;cursor:pointer}
.hero-card-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.hero-card-content{position:absolute;bottom:0;left:0;right:0;padding:14px 16px;background:linear-gradient(to top,rgba(0,0,0,0.85),transparent)}
.hero-card-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;opacity:0.7;margin-bottom:3px}
.hero-card-title{font-size:16px;font-weight:700;line-height:1.2}
.hero-card-disc{font-size:13px;margin-top:4px;font-weight:600}

.cats-scroll{display:flex;gap:8px;padding:0 20px 4px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;margin-bottom:4px}
.cats-scroll::-webkit-scrollbar{display:none}
.cat-pill{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:68px;cursor:pointer;padding:10px 6px;border-radius:12px;border:0.5px solid rgba(255,255,255,0.08);background:var(--surface);transition:all 0.15s;flex-shrink:0}
.cat-pill.active{border-color:var(--accent);background:rgba(245,166,35,0.12)}
.cat-pill-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.cat-pill-label{font-size:10px;color:var(--text2);text-align:center;line-height:1.2;font-weight:500}
.cat-pill.active .cat-pill-label{color:var(--accent)}

.stats-bar{display:flex;gap:8px;padding:0 20px;margin:12px 0}
.stat-chip{background:var(--surface);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--text2)}
.stat-chip strong{color:var(--text);font-size:13px}

.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px}
.offer-card{background:var(--surface);border-radius:var(--radius);overflow:hidden;border:0.5px solid rgba(255,255,255,0.06);cursor:pointer;transition:border-color 0.15s}
.offer-card:active{transform:scale(0.98)}
.card-img{height:80px;display:flex;align-items:center;justify-content:center;position:relative}
.card-disc-badge{position:absolute;top:8px;right:8px;font-size:10px;font-weight:800;padding:3px 7px;border-radius:20px;letter-spacing:0.2px}
.disc-high{background:var(--accent);color:#000}
.disc-mid{background:#4A9EFF;color:#000}
.disc-low{background:var(--surface3);color:var(--text2)}
.disc-na{background:var(--surface3);color:var(--text3);font-size:9px}
.card-body{padding:10px 10px 12px}
.card-name{font-size:13px;font-weight:600;line-height:1.3;color:var(--text);margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-cat{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:3px}
.card-cat-dot{width:5px;height:5px;border-radius:50%;display:inline-block;flex-shrink:0}

.sort-bar{display:flex;gap:6px;padding:0 20px;margin:12px 0 10px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.sort-bar::-webkit-scrollbar{display:none}
.sort-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;background:var(--surface);color:var(--text2);border:0.5px solid rgba(255,255,255,0.08);cursor:pointer;white-space:nowrap;flex-shrink:0}
.sort-btn.active{background:var(--accent);color:#000;border-color:transparent;font-weight:700}

.empty{padding:3rem 1rem;text-align:center;color:var(--text3);font-size:14px;grid-column:1/-1}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(28,28,30,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:0.5px solid rgba(255,255,255,0.08);display:flex;padding:8px 0 env(safe-area-inset-bottom,16px);z-index:200}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:2px 0}
.nav-label{font-size:10px;color:var(--text3)}
.nav-item.active .nav-label{color:var(--accent)}

.tag{display:inline-block;font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(245,166,35,0.15);color:var(--accent);font-weight:600;margin-bottom:6px;letter-spacing:0.3px}
.divider{height:0.5px;background:rgba(255,255,255,0.06);margin:16px 0}
</style>
</head>

const HERO_PICKS=[['Jawaher Jewellery','Shops','65%'],['Villa H Beauty','Beauty & Salon','Up to 50%'],['BFT Gym','Fitness','40-50%'],['bodystorm sport','Fitness','60%'],['The Pearl Dermatology','Beauty & Salon','25-60%'],['EXCELSIOR HOTEL GALLIA','Global','25% off']];
const ALL_CATS=['All','Dining','Hotels','Health center','Beauty & Salon','Shops','Fitness','Children & Education','Services','Decor','Events','Global','Current Offers'];

let activeCat='All',activeSort='az';
function getDiscNum(d){const m=d.match(/(\d+)/g);if(!m)return 0;return Math.max(...m.map(Number));}
function badgeClass(d){const n=getDiscNum(d);if(n>=40)return 'disc-high';if(n>=20)return 'disc-mid';if(n>0)return 'disc-low';return 'disc-na';}

function buildHero(){
  document.getElementById('hero-scroll').innerHTML=HERO_PICKS.map(([n,c,d])=>{
    const m=CATS_META[c]||CATS_META['All'];
    return `<div class="hero-card" style="background:${m.bg}">
      <div class="hero-card-bg" style="justify-content:flex-end;padding-right:12px;opacity:0.6">
        <div style="width:56px;height:56px;background:rgba(255,255,255,0.05);border-radius:50%;display:flex;align-items:center;justify-content:center">${m.icon}</div>
      </div>
      <div class="hero-card-content">
        <div class="hero-card-label">${c}</div>
        <div class="hero-card-title">${n}</div>
        <div class="hero-card-disc" style="color:${m.color}">${d} off</div>
      </div>
    </div>`;
  }).join('');
}

function buildCats(){
  document.getElementById('cats-scroll').innerHTML=ALL_CATS.map(c=>{
    const m=CATS_META[c]||CATS_META['All'];
    const count=c==='All'?OFFERS.length:OFFERS.filter(o=>o[1]===c).length;
    return `<div class="cat-pill${c===activeCat?' active':''}" onclick="setCat('${c.replace(/'/g,"\\'")}')">
      <div class="cat-pill-icon" style="background:${m.bg}">${m.icon}</div>
      <div class="cat-pill-label">${c==='Children & Education'?'Kids & Edu':c==='Current Offers'?'Hot Deals':c}<br><span style="opacity:0.6;font-size:9px">${count}</span></div>
    </div>`;
  }).join('');
}

function buildSorts(){
  document.getElementById('sort-bar').innerHTML=SORTS.map(s=>`<button class="sort-btn${s.key===activeSort?' active':''}" onclick="setSort('${s.key}')">${s.label}</button>`).join('');
}

function setCat(c){activeCat=c;buildCats();render();}
function setSort(s){activeSort=s;buildSorts();render();}

function render(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  let data=OFFERS.filter(([n,c,d])=>{
    if(activeCat!=='All'&&c!==activeCat)return false;
    if(q&&!n.toLowerCase().includes(q)&&!c.toLowerCase().includes(q)&&!d.toLowerCase().includes(q))return false;
    return true;
  });
  if(activeSort==='az')data.sort((a,b)=>a[0].localeCompare(b[0]));
  else if(activeSort==='disc')data.sort((a,b)=>getDiscNum(b[2])-getDiscNum(a[2]));
  else data.sort((a,b)=>a[1].localeCompare(b[1])||a[0].localeCompare(b[0]));
  document.getElementById('count').textContent=data.length;
  document.getElementById('active-cat-chip').textContent=activeCat==='All'?'All categories':activeCat;
  const grid=document.getElementById('grid');
  if(!data.length){grid.innerHTML='<div class="empty">No offers found</div>';return;}
  const m=CATS_META;
  grid.innerHTML=data.map(([n,c,d])=>{
    const cm=m[c]||m['All'];
    return `<div class="offer-card">
      <div class="card-img" style="background:${cm.bg}">
        <div style="opacity:0.7">${cm.icon}</div>
        <div class="card-disc-badge ${badgeClass(d)}">${d}</div>
      </div>
      <div class="card-body">
        <div class="card-name">${n}</div>
        <div class="card-cat"><span class="card-cat-dot" style="background:${cm.color}"></span>${c}</div>
      </div>
    </div>`;
  }).join('');
}

buildHero();buildCats();buildSorts();render();
</script>
